  function translateLabel(label) {
    const lower = label.toLowerCase().trim();
    // Check exact match
    for (const [en, fr] of Object.entries(labelTranslations)) {
      if (lower === en.toLowerCase()) return fr;
    }
    // Check if label contains a known term
    for (const [en, fr] of Object.entries(labelTranslations)) {
      if (lower.includes(en.toLowerCase())) return fr;
    }
    // Return cleaned original
    return lower.replace(/,/g, '').trim();
  }

    if (modelLoading) return null;
    modelLoading = true;
    document.getElementById('modelLoading').classList.add('active');
    try {
      model = await mobilenet.load({ version: 2, alpha: 1.0 });
      document.getElementById('modelLoading').classList.remove('active');
      document.getElementById('modelReady').classList.add('active');
      setTimeout(() => document.getElementById('modelReady').classList.remove('active'), 3000);
      return model;
    } catch (err) {
      console.error('Erreur chargement modele:', err);
      document.getElementById('modelLoading').classList.remove('active');
      modelLoading = false;
      return null;
    }
  }

  async function analyzeImage(imgElement) {
    const m = await loadModel();
    if (!m) return null;
    try {
      const predictions = await m.classify(imgElement, 5);
      return predictions.filter(p => p.probability > 0.05);
    } catch (err) {
      console.error('Erreur analyse:', err);
      return null;
    }
  }

  function generateSeoFromPredictions(predictions) {
    if (!predictions || predictions.length === 0) {
      return { filename: 'image', alt: 'Image', title: 'Image', tags: [] };
    }

    const tags = predictions.map(p => ({
      label: p.className,
      translated: translateLabel(p.className),
      confidence: Math.round(p.probability * 100)
    }));

    // Use top predictions for naming
    const mainLabels = tags.slice(0, 3).map(t => t.translated);

    // SEO filename: lowercase, hyphens
    const filename = mainLabels
      .join('-')
      .toLowerCase()
      .replace(/[^a-z0-9\u00C0-\u024F-]/g, '-')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '')
      .substring(0, 60);

    // Alt: descriptive sentence
    const mainItem = tags[0].translated;
    const mainItemCapitalized = mainItem.charAt(0).toUpperCase() + mainItem.slice(1);
    let alt;
    if (tags.length >= 2) {
      const secondary = tags.slice(1, 3).map(t => t.translated).join(' et ');
      alt = `${mainItemCapitalized} - ${secondary}`;
    } else {
      alt = mainItemCapitalized;
    }

    // Title: slightly different, more descriptive
    const title = `Photo de ${mainItem}${tags.length > 1 ? ' - ' + tags[1].translated : ''}`;

    return { filename, alt, title, tags };
  }

  // ---- Start loading model immediately ----
  loadModel();

  // Drop zone events
  ['dragenter', 'dragover'].forEach(e => {
    dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add('dragover'); });
  });
  ['dragleave', 'drop'].forEach(e => {
    dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.remove('dragover'); });
  });
  dropZone.addEventListener('drop', e => handleFiles(e.dataTransfer.files));
  document.getElementById('browseBtn').addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('click', (e) => {
    if (e.target === dropZone || e.target.classList.contains('drop-zone-icon') || e.target.classList.contains('formats'))
      fileInput.click();
  });
  fileInput.addEventListener('change', () => handleFiles(fileInput.files));
  document.getElementById('clearAll').addEventListener('click', () => {
    cardsContainer.innerHTML = '';
    results.classList.remove('active');
  });

  function handleFiles(files) {
    if (!files.length) return;
    results.classList.add('active');
    const total = cardsContainer.children.length + files.length;
    batchTitle.textContent = `${total} image${total > 1 ? 's' : ''} chargee${total > 1 ? 's' : ''}`;
    Array.from(files).forEach(file => processImage(file));
    fileInput.value = '';
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' o';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' Ko';
    return (bytes / 1048576).toFixed(1) + ' Mo';
  }

  // Auto-optimize: find best quality that keeps file under 1MB
  async function findOptimalQuality(img, maxBytes = 1000000) {
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);

    // Start at 80, check if under 1MB
    let quality = 80;
    let blob = await new Promise(r => canvas.toBlob(r, 'image/webp', quality / 100));

    if (blob && blob.size <= maxBytes) return { quality, blob };

    // Binary search for optimal quality
    let lo = 10, hi = 75;
    let bestQuality = 10;
    let bestBlob = null;

    while (lo <= hi) {
      const mid = Math.floor((lo + hi) / 2);
      blob = await new Promise(r => canvas.toBlob(r, 'image/webp', mid / 100));
      if (blob && blob.size <= maxBytes) {
        bestQuality = mid;
        bestBlob = blob;
        lo = mid + 1;
      } else {
        hi = mid - 1;
      }
    }

    // If even quality 10 is too big, try resizing
    if (!bestBlob) {
      let scale = 0.9;
      while (scale > 0.2) {
        const w = Math.round(img.naturalWidth * scale);
        const h = Math.round(img.naturalHeight * scale);
        canvas.width = w;
        canvas.height = h;
        ctx.drawImage(img, 0, 0, w, h);
        blob = await new Promise(r => canvas.toBlob(r, 'image/webp', 0.5));
        if (blob && blob.size <= maxBytes) {
          return { quality: 50, blob, resized: { width: w, height: h } };
        }
        scale -= 0.1;
      }
      // Fallback
      return { quality: 10, blob };
    }

    return { quality: bestQuality, blob: bestBlob };
  }

  function convertToWebP(img, quality) {
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    return new Promise(resolve => {
      canvas.toBlob(blob => resolve(blob), 'image/webp', quality / 100);
    });
  }

  function processImage(file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = async function() {
        const id = 'card-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5);

        const card = document.createElement('div');
        card.className = 'image-card';
        card.id = id;
        card.innerHTML = `
          <div class="image-card-header">
            <div class="preview-wrapper">
              <img src="${e.target.result}" alt="preview" id="${id}-imgel">
            </div>
            <div class="image-info">
              <div class="original-name">Original : ${file.name}</div>
              <div class="size-info">
                <span class="size-badge original">Original : ${formatSize(file.size)}</span>
                <span class="size-badge webp" id="${id}-webpsize">WebP : optimisation...</span>
                <span class="size-badge savings" id="${id}-savings">...</span>
              </div>
              <div style="margin-top: 8px; font-size: 0.8rem; color: #666;">${img.naturalWidth} x ${img.naturalHeight} px</div>
              <div class="ai-status" id="${id}-aistatus">
                <span class="ai-spinner"></span> Analyse IA en cours...
              </div>
            </div>
          </div>

          <div id="${id}-tags" class="detected-tags" style="margin-bottom: 16px;"></div>

          <div class="field">
            <label>Qualite WebP <span class="tag" id="${id}-autolabel">AUTO &lt; 1 Mo</span></label>
            <div class="quality-row">
              <input type="range" min="1" max="100" value="80" id="${id}-quality">
              <span class="quality-value" id="${id}-qualval">80%</span>
            </div>
          </div>

          <div class="field">
            <label>Nom du fichier <span class="tag">SEO</span> <span class="tag-ai">IA</span></label>
            <input type="text" id="${id}-filename" value="" placeholder="Analyse en cours...">
            <div class="hint">Nom SEO genere par IA a partir du contenu de l'image</div>
          </div>

          <div class="field">
            <label>Attribut alt <span class="tag">SEO</span> <span class="tag-ai">IA</span></label>
            <input type="text" id="${id}-alt" value="" placeholder="Analyse en cours...">
            <div class="hint">Description de l'image generee par IA pour l'accessibilite et le SEO</div>
          </div>

          <div class="field">
            <label>Attribut title <span class="tag">SEO</span> <span class="tag-ai">IA</span></label>
            <input type="text" id="${id}-title" value="" placeholder="Analyse en cours...">
            <div class="hint">Texte affiche au survol, genere par IA</div>
          </div>

          <div class="seo-preview">
            <h4>Apercu HTML</h4>
            <code id="${id}-htmlpreview"></code>
          </div>

          <div class="actions">
            <button class="btn btn-primary" id="${id}-download">Telecharger WebP</button>
            <button class="btn btn-copy" id="${id}-copyhtml">Copier le HTML</button>
            <button class="btn btn-secondary" id="${id}-remove">Supprimer</button>
          </div>
        `;

        cardsContainer.appendChild(card);

        const qualitySlider = document.getElementById(`${id}-quality`);
        const qualVal = document.getElementById(`${id}-qualval`);
        const filenameInput = document.getElementById(`${id}-filename`);
        const altInput = document.getElementById(`${id}-alt`);
        const titleInput = document.getElementById(`${id}-title`);
        const htmlPreview = document.getElementById(`${id}-htmlpreview`);
        const aiStatus = document.getElementById(`${id}-aistatus`);
        const tagsContainer = document.getElementById(`${id}-tags`);

        function updateHtmlPreview() {
          const fn = filenameInput.value || 'image';
          const alt = altInput.value;
          const title = titleInput.value;
          htmlPreview.textContent = `<img src="${fn}.webp" alt="${alt}" title="${title}" width="${img.naturalWidth}" height="${img.naturalHeight}" loading="lazy">`;
        }

        // --- Auto-optimize to < 1MB ---
        const optResult = await findOptimalQuality(img);
        qualitySlider.value = optResult.quality;
        qualVal.textContent = optResult.quality + '%';
        if (optResult.blob) {
          document.getElementById(`${id}-webpsize`).textContent = `WebP : ${formatSize(optResult.blob.size)}`;
          const savings = ((1 - optResult.blob.size / file.size) * 100).toFixed(0);
          document.getElementById(`${id}-savings`).textContent = `${savings > 0 ? '-' : '+'}${Math.abs(savings)}%`;
        }
        if (optResult.resized) {
          document.getElementById(`${id}-autolabel`).textContent = `AUTO < 1 Mo (redim. ${optResult.resized.width}x${optResult.resized.height})`;
        }

        // --- AI Analysis ---
        const imgEl = document.getElementById(`${id}-imgel`);
        const predictions = await analyzeImage(imgEl);
        const seo = generateSeoFromPredictions(predictions);

        filenameInput.value = seo.filename;
        altInput.value = seo.alt;
        titleInput.value = seo.title;

        if (seo.tags && seo.tags.length > 0) {
          aiStatus.innerHTML = '&#10003; Analyse terminee';
          aiStatus.classList.add('done');
          tagsContainer.innerHTML = seo.tags.map(t =>
            `<span class="detected-tag">${t.translated}<span class="confidence">${t.confidence}%</span></span>`
          ).join('');
        } else {
          aiStatus.innerHTML = 'Analyse non disponible';
          aiStatus.classList.add('done');
          // Fallback to filename-based
          const base = file.name.replace(/\.[^.]+$/, '').replace(/[_.\s]+/g, '-').toLowerCase();
          filenameInput.value = base;
          altInput.value = base.replace(/-/g, ' ');
          titleInput.value = base.replace(/-/g, ' ');
        }

        updateHtmlPreview();

        // Events
        async function updateWebPSize() {
          const blob = await convertToWebP(img, parseInt(qualitySlider.value));
          if (!blob) return;
          document.getElementById(`${id}-webpsize`).textContent = `WebP : ${formatSize(blob.size)}`;
          const savings = ((1 - blob.size / file.size) * 100).toFixed(0);
          document.getElementById(`${id}-savings`).textContent = `${savings > 0 ? '-' : '+'}${Math.abs(savings)}%`;
        }

        qualitySlider.addEventListener('input', () => {
          qualVal.textContent = qualitySlider.value + '%';
          document.getElementById(`${id}-autolabel`).textContent = 'MANUEL';
          updateWebPSize();
        });

        [filenameInput, altInput, titleInput].forEach(input => {
          input.addEventListener('input', updateHtmlPreview);
        });

        document.getElementById(`${id}-download`).addEventListener('click', async () => {
          const blob = await convertToWebP(img, parseInt(qualitySlider.value));
          if (!blob) return;
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = (filenameInput.value || 'image') + '.webp';
          a.click();
          URL.revokeObjectURL(url);
          showToast('Image WebP telechargee !');
        });

        document.getElementById(`${id}-copyhtml`).addEventListener('click', () => {
          navigator.clipboard.writeText(htmlPreview.textContent).then(() => {
            showToast('HTML copie !');
          });
        });

        document.getElementById(`${id}-remove`).addEventListener('click', () => {
          card.remove();
          const remaining = cardsContainer.children.length;
          if (!remaining) results.classList.remove('active');
          else batchTitle.textContent = `${remaining} image${remaining > 1 ? 's' : ''} chargee${remaining > 1 ? 's' : ''}`;
        });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }
</script>
