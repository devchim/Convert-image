<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image to WebP - Optimiseur SEO avec IA</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js"></script>
  <script src="https://unpkg.com/exifr@7.1.3/dist/full.umd.cjs"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 40px;
      font-size: 0.95rem;
    }

    /* Loading bar */
    .model-loading {
      text-align: center;
      padding: 12px;
      margin-bottom: 20px;
      border-radius: 10px;
      background: #1a1a35;
      border: 1px solid #2a2a45;
      display: none;
    }
    .model-loading.active { display: block; }
    .model-loading .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #6366f1;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .model-loading .text { color: #aaa; font-size: 0.85rem; }
    .model-ready {
      text-align: center;
      padding: 8px;
      margin-bottom: 20px;
      border-radius: 10px;
      background: #1a2a1a;
      border: 1px solid #2a4a2a;
      display: none;
      font-size: 0.85rem;
      color: #34d399;
    }
    .model-ready.active { display: block; }

    /* Drop Zone */
    .drop-zone {
      border: 2px dashed #3b3b5c;
      border-radius: 16px;
      padding: 60px 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: #16162a;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: #6366f1;
      background: #1a1a35;
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.15);
    }

    .drop-zone-icon { font-size: 3rem; margin-bottom: 16px; display: block; }
    .drop-zone-text { font-size: 1.1rem; color: #aaa; }
    .drop-zone-text span { color: #6366f1; text-decoration: underline; cursor: pointer; }
    .drop-zone input[type="file"] { display: none; }
    .formats { margin-top: 12px; font-size: 0.8rem; color: #555; }

    /* Results */
    .results { display: none; margin-top: 32px; }
    .results.active { display: block; }

    .image-card {
      background: #16162a;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid #2a2a45;
    }

    .image-card-header {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      align-items: flex-start;
    }

    .preview-wrapper {
      flex-shrink: 0;
      width: 140px;
      height: 140px;
      border-radius: 12px;
      overflow: hidden;
      background: #0f0f1a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview-wrapper img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .image-info { flex: 1; min-width: 0; }

    .original-name {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 4px;
      word-break: break-all;
    }

    .size-info {
      display: flex;
      gap: 16px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .size-badge {
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 6px;
      background: #1e1e38;
    }

    .size-badge.original { color: #f87171; }
    .size-badge.webp { color: #34d399; }
    .size-badge.savings { color: #fbbf24; }

    /* AI Badge */
    .ai-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 6px;
      background: #1e1e38;
      color: #a78bfa;
    }
    .ai-status .ai-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #a78bfa;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .ai-status.done { color: #34d399; background: #1a2a1a; }

    /* EXIF Metadata */
    .exif-info {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
      padding: 12px;
      border-radius: 8px;
      background: #0f0f1a;
      border: 1px solid #2a2a45;
    }
    .exif-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: #aaa;
    }
    .exif-item .exif-icon { font-size: 1rem; }
    .exif-item .exif-label { color: #666; }
    .exif-item .exif-value { color: #e0e0e0; font-weight: 500; }
    .exif-item.location .exif-value { color: #f59e0b; }

    /* Form Fields */
    .field { margin-bottom: 16px; }

    .field label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: #999;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .field label .tag {
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 4px;
      background: #6366f1;
      color: white;
      font-weight: 600;
    }

    .field label .tag-ai {
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 4px;
      background: #a78bfa;
      color: white;
      font-weight: 600;
    }

    .field label .tag-geo {
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 4px;
      background: #f59e0b;
      color: #0f0f1a;
      font-weight: 600;
    }

    .field input,
    .field textarea {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #2a2a45;
      background: #0f0f1a;
      color: #e0e0e0;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .field input:focus,
    .field textarea:focus {
      outline: none;
      border-color: #6366f1;
    }

    .field textarea { resize: vertical; min-height: 60px; }
    .field .hint { font-size: 0.75rem; color: #555; margin-top: 4px; }

    /* Quality Slider */
    .quality-row { display: flex; align-items: center; gap: 12px; }

    .quality-row input[type="range"] {
      flex: 1;
      accent-color: #6366f1;
      height: 6px;
      padding: 0;
      border: none;
      background: transparent;
    }

    .quality-value {
      font-size: 0.95rem;
      font-weight: 600;
      color: #6366f1;
      min-width: 36px;
      text-align: right;
    }

    /* Buttons */
    .actions { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-secondary { background: #1e1e38; color: #aaa; border: 1px solid #2a2a45; }
    .btn-secondary:hover { background: #2a2a45; color: #e0e0e0; }
    .btn-copy { background: #1e1e38; color: #34d399; border: 1px solid #2a4a3a; font-size: 0.85rem; padding: 6px 14px; }
    .btn-copy:hover { background: #1a3a2a; }

    /* SEO Preview */
    .seo-preview {
      background: #0f0f1a;
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
      border: 1px solid #2a2a45;
    }

    .seo-preview h4 {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .seo-preview code {
      display: block;
      font-size: 0.85rem;
      color: #a78bfa;
      background: #16162a;
      padding: 12px;
      border-radius: 6px;
      word-break: break-all;
      line-height: 1.5;
    }

    /* Location input with autocomplete */
    .location-field {
      position: relative;
      margin-bottom: 16px;
    }
    .location-field label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: #999;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .location-input-wrapper {
      position: relative;
    }
    .location-input-wrapper input {
      width: 100%;
      padding: 10px 14px 10px 36px;
      border-radius: 8px;
      border: 1px solid #2a2a45;
      background: #0f0f1a;
      color: #e0e0e0;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .location-input-wrapper input:focus {
      outline: none;
      border-color: #f59e0b;
    }
    .location-input-wrapper input::placeholder { color: #555; }
    .location-input-wrapper .loc-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
    }
    .location-suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #16162a;
      border: 1px solid #3b3b5c;
      border-top: none;
      border-radius: 0 0 8px 8px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 50;
      display: none;
    }
    .location-suggestions.active { display: block; }
    .location-suggestion {
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.85rem;
      color: #ccc;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .location-suggestion:hover { background: #1e1e38; color: #f59e0b; }
    .location-suggestion .loc-region { color: #666; font-size: 0.75rem; }
    .location-btn-apply {
      background: #f59e0b;
      color: #0f0f1a;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.2s;
    }
    .location-btn-apply:hover { background: #d97706; }

    /* Detected tags */
    .detected-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .detected-tag {
      font-size: 0.75rem;
      padding: 3px 8px;
      border-radius: 4px;
      background: #1e1e38;
      color: #a78bfa;
      border: 1px solid #3b3b5c;
    }
    .detected-tag.geo-tag {
      color: #f59e0b;
      border-color: #5a4a1a;
      background: #1e1a10;
    }
    .detected-tag.landmark-tag {
      color: #ef4444;
      border-color: #5a1a1a;
      background: #1e1010;
    }
    .detected-tag.vision-tag {
      color: #3b82f6;
      border-color: #1a3a5a;
      background: #101a2e;
    }
    .detected-tag.web-tag {
      color: #10b981;
      border-color: #1a4a3a;
      background: #101e1a;
    }
    .detected-tag.guess-tag {
      color: #f472b6;
      border-color: #4a1a3a;
      background: #1e101a;
    }
    .detected-tag .confidence { color: #666; margin-left: 4px; }

    /* Responsive */
    @media (max-width: 600px) {
      .image-card-header { flex-direction: column; align-items: center; }
      .preview-wrapper { width: 120px; height: 120px; }
      h1 { font-size: 1.5rem; }
      .actions { flex-direction: column; }
      .btn { justify-content: center; }
      .exif-info { flex-direction: column; }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #34d399;
      color: #0f0f1a;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 100;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    .batch-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .batch-header h3 { color: #aaa; font-size: 1rem; }
  </style>
</head>
<body>

<div class="container">
  <h1>Image to WebP Converter</h1>
  <p class="subtitle">Convertissez, renommez et optimisez vos images pour le SEO avec IA + GPS</p>

  <div class="model-loading" id="modelLoading">
    <span class="spinner"></span>
    <span class="text">Chargement du modele IA de reconnaissance d'images...</span>
  </div>
  <div class="model-ready" id="modelReady">
    IA prete - Les images seront analysees automatiquement
  </div>

  <div class="drop-zone" id="dropZone">
    <span class="drop-zone-icon">🖼️</span>
    <p class="drop-zone-text">Glissez vos images ici ou <span id="browseBtn">parcourez</span></p>
    <p class="formats">JPG, PNG, GIF, BMP, SVG, AVIF, TIFF</p>
    <input type="file" id="fileInput" multiple accept="image/*">
  </div>

  <div class="results" id="results">
    <div class="batch-header">
      <h3 id="batchTitle"></h3>
      <button class="btn btn-secondary" id="clearAll">Tout effacer</button>
    </div>
    <div id="cardsContainer"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const results = document.getElementById('results');
  const cardsContainer = document.getElementById('cardsContainer');
  const batchTitle = document.getElementById('batchTitle');
  const toast = document.getElementById('toast');

  // ===== Cities Database =====
  const cities = [
    // Maroc
    { name: 'Agadir', region: 'Souss-Massa', country: 'Maroc', landmarks: ['plage', 'corniche', 'kasbah', 'souk'] },
    { name: 'Casablanca', region: 'Casablanca-Settat', country: 'Maroc', landmarks: ['mosquee Hassan II', 'corniche Ain Diab', 'medina ancienne'] },
    { name: 'Marrakech', region: 'Marrakech-Safi', country: 'Maroc', landmarks: ['place Jemaa el-Fna', 'jardin Majorelle', 'palais Bahia', 'medina', 'koutoubia'] },
    { name: 'Rabat', region: 'Rabat-Sale-Kenitra', country: 'Maroc', landmarks: ['kasbah des Oudayas', 'tour Hassan', 'mausolee Mohammed V', 'medina'] },
    { name: 'Fes', region: 'Fes-Meknes', country: 'Maroc', landmarks: ['medina Fes el-Bali', 'tanneries Chouara', 'mosquee Qaraouiyine', 'Bab Boujloud'] },
    { name: 'Tanger', region: 'Tanger-Tetouan-Al Hoceima', country: 'Maroc', landmarks: ['cap Spartel', 'grottes d\'Hercule', 'kasbah', 'medina'] },
    { name: 'Meknes', region: 'Fes-Meknes', country: 'Maroc', landmarks: ['Bab Mansour', 'place El Hedim', 'mausolee Moulay Ismail'] },
    { name: 'Essaouira', region: 'Marrakech-Safi', country: 'Maroc', landmarks: ['port', 'remparts', 'medina', 'plage'] },
    { name: 'Chefchaouen', region: 'Tanger-Tetouan-Al Hoceima', country: 'Maroc', landmarks: ['medina bleue', 'kasbah', 'cascade Akchour'] },
    { name: 'Ouarzazate', region: 'Draa-Tafilalet', country: 'Maroc', landmarks: ['kasbah Ait Benhaddou', 'studios cinema', 'kasbah Taourirt'] },
    { name: 'Tetouan', region: 'Tanger-Tetouan-Al Hoceima', country: 'Maroc', landmarks: ['medina', 'place Hassan II', 'musee archeologique'] },
    { name: 'Ifrane', region: 'Fes-Meknes', country: 'Maroc', landmarks: ['foret de cedres', 'lac Dayet Aoua', 'lion de pierre'] },
    { name: 'Dakhla', region: 'Dakhla-Oued Ed-Dahab', country: 'Maroc', landmarks: ['lagon', 'plage', 'kitesurf'] },
    { name: 'Nador', region: 'Oriental', country: 'Maroc', landmarks: ['lagune Marchica', 'corniche'] },
    { name: 'Oujda', region: 'Oriental', country: 'Maroc', landmarks: ['medina', 'parc Lalla Aicha'] },
    { name: 'Kenitra', region: 'Rabat-Sale-Kenitra', country: 'Maroc', landmarks: ['foret Mamora', 'plage Mehdia'] },
    { name: 'Sale', region: 'Rabat-Sale-Kenitra', country: 'Maroc', landmarks: ['medina', 'plage'] },
    { name: 'Safi', region: 'Marrakech-Safi', country: 'Maroc', landmarks: ['poterie', 'ksar el-Bahr', 'medina'] },
    { name: 'El Jadida', region: 'Casablanca-Settat', country: 'Maroc', landmarks: ['cite portugaise', 'citerne', 'plage'] },
    { name: 'Beni Mellal', region: 'Beni Mellal-Khenifra', country: 'Maroc', landmarks: ['kasbah Ras el-Ain', 'cascades Ouzoud'] },
    { name: 'Tiznit', region: 'Souss-Massa', country: 'Maroc', landmarks: ['medina', 'bijouterie', 'remparts'] },
    { name: 'Taroudant', region: 'Souss-Massa', country: 'Maroc', landmarks: ['remparts', 'souk', 'palmeraie'] },
    { name: 'Merzouga', region: 'Draa-Tafilalet', country: 'Maroc', landmarks: ['dunes Erg Chebbi', 'desert', 'bivouac'] },
    { name: 'Tinghir', region: 'Draa-Tafilalet', country: 'Maroc', landmarks: ['gorges du Todra', 'palmeraie'] },
    { name: 'Al Hoceima', region: 'Tanger-Tetouan-Al Hoceima', country: 'Maroc', landmarks: ['plage Quemado', 'parc national'] },
    // Villes internationales populaires
    { name: 'Paris', region: 'Ile-de-France', country: 'France', landmarks: ['tour Eiffel', 'Champs-Elysees', 'Notre-Dame', 'Louvre'] },
    { name: 'Istanbul', region: 'Marmara', country: 'Turquie', landmarks: ['Sainte-Sophie', 'mosquee Bleue', 'Grand Bazar', 'Bosphore'] },
    { name: 'Dubai', region: 'Dubai', country: 'Emirats Arabes Unis', landmarks: ['Burj Khalifa', 'Palm Jumeirah', 'Dubai Mall'] },
    { name: 'Barcelona', region: 'Catalogne', country: 'Espagne', landmarks: ['Sagrada Familia', 'Parc Guell', 'Ramblas'] },
    { name: 'Rome', region: 'Latium', country: 'Italie', landmarks: ['Colisee', 'Vatican', 'fontaine de Trevi'] },
    { name: 'Londres', region: 'Angleterre', country: 'Royaume-Uni', landmarks: ['Big Ben', 'Tower Bridge', 'Buckingham Palace'] },
    { name: 'New York', region: 'New York', country: 'Etats-Unis', landmarks: ['Statue de la Liberte', 'Times Square', 'Central Park'] },
    { name: 'Tokyo', region: 'Kanto', country: 'Japon', landmarks: ['temple Senso-ji', 'tour de Tokyo', 'Shibuya'] },
    { name: 'Le Caire', region: 'Le Caire', country: 'Egypte', landmarks: ['pyramides de Gizeh', 'sphinx', 'musee egyptien'] },
    { name: 'Tunis', region: 'Tunis', country: 'Tunisie', landmarks: ['medina', 'Carthage', 'Sidi Bou Said'] },
    { name: 'Alger', region: 'Alger', country: 'Algerie', landmarks: ['casbah', 'Notre-Dame d\'Afrique', 'mosquee Ketchaoua'] },
  ];

  function searchCities(query) {
    if (!query || query.length < 2) return [];
    const q = query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    return cities.filter(c => {
      const name = c.name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      const region = c.region.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      const country = c.country.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      return name.includes(q) || region.includes(q) || country.includes(q);
    }).slice(0, 8);
  }

  // ===== Google Cloud Vision API =====
  const VISION_API_KEY = 'AIzaSyDhbUSnCiqeHFNHQ1zuHGtnvUrNvJ1oRew';

  async function analyzeWithGoogleVision(file) {
    try {
      // Convert file to base64
      const base64 = await new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(file);
      });

      const response = await fetch(
        `https://vision.googleapis.com/v1/images:annotate?key=${VISION_API_KEY}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            requests: [{
              image: { content: base64 },
              features: [
                { type: 'LANDMARK_DETECTION', maxResults: 5 },
                { type: 'LABEL_DETECTION', maxResults: 10 },
                { type: 'WEB_DETECTION', maxResults: 5 },
              ]
            }]
          })
        }
      );

      if (!response.ok) {
        console.warn('Google Vision API error:', response.status);
        return null;
      }

      const data = await response.json();
      const result = data.responses?.[0];
      if (!result) return null;

      const visionData = {
        landmarks: [],
        labels: [],
        webEntities: [],
        bestGuessLabels: [],
        location: null,
      };

      // Landmarks (ex: "Kasbah des Oudayas", "Tour Hassan")
      if (result.landmarkAnnotations) {
        visionData.landmarks = result.landmarkAnnotations.map(l => ({
          name: l.description,
          confidence: Math.round((l.score || 0) * 100),
        }));
        // Extract location from landmark
        const firstLandmark = result.landmarkAnnotations[0];
        if (firstLandmark?.locations?.[0]?.latLng) {
          visionData.location = {
            lat: firstLandmark.locations[0].latLng.latitude,
            lon: firstLandmark.locations[0].latLng.longitude,
          };
        }
      }

        visionData.labels = result.labelAnnotations.map(l => ({
          name: l.description,
          confidence: Math.round((l.score || 0) * 100),
        }));

      // Web detection (best guesses + web entities)
      if (result.webDetection) {
        if (result.webDetection.bestGuessLabels) {
          visionData.bestGuessLabels = result.webDetection.bestGuessLabels.map(l => l.label);
        }
        if (result.webDetection.webEntities) {

            .filter(e => e.description && e.score > 0.3)
            .map(e => ({
              name: e.description,
              confidence: Math.round((e.score || 0) * 100),
            }));
        }
      }

      return visionData;
    } catch (err) {
      console.warn('Google Vision API failed:', err);
      return null;
    }
  }

  function translateLabel(label) {
    const lower = label.toLowerCase().trim();
    for (const [en, fr] of Object.entries(labelTranslations)) {
      if (lower === en.toLowerCase()) return fr;
    }
    for (const [en, fr] of Object.entries(labelTranslations)) {
      if (lower.includes(en.toLowerCase())) return fr;
    }
    return lower.replace(/,/g, '').trim();

  async function analyzeImage(imgElement) {
    const m = await loadModel();
    if (!m) return null;
    try {
      const predictions = await m.classify(imgElement, 5);
      // Filter: confidence > 15% AND not in ignored list
      return predictions.filter(p => {
        if (p.probability < 0.15) return false;
        const lower = p.className.toLowerCase();
        for (const ignored of ignoredLabels) {
          if (lower.includes(ignored.toLowerCase())) return false;
        }
        return true;
      });

  async function extractExifData(file) {
    try {
      const exif = await exifr.parse(file, {
        gps: true,
        xmp: true,
        ifd0: true,
        exif: true,
        pick: ['Make', 'Model', 'DateTimeOriginal', 'CreateDate',
               'latitude', 'longitude', 'GPSLatitude', 'GPSLongitude',
               'ImageDescription', 'XPTitle', 'XPSubject', 'XPComment',
               'ObjectName', 'Caption', 'Headline']
      });
      if (!exif) return null;

      const result = {};

      // GPS
      if (exif.latitude && exif.longitude) {
        result.lat = exif.latitude;
        result.lon = exif.longitude;
      }

      // Date
      if (exif.DateTimeOriginal || exif.CreateDate) {
        const d = exif.DateTimeOriginal || exif.CreateDate;
        if (d instanceof Date) {
          result.date = d.toLocaleDateString('fr-FR', {
            year: 'numeric', month: 'long', day: 'numeric'
          });
          result.year = d.getFullYear();
        }
      }

      // Camera
      if (exif.Make || exif.Model) {
        const make = (exif.Make || '').trim();
        const model = (exif.Model || '').trim();
        // Avoid repeating brand in model name
        if (model.toLowerCase().startsWith(make.toLowerCase())) {
          result.camera = model;
        } else {
          result.camera = [make, model].filter(Boolean).join(' ');
        }
      }

      // Embedded description
      const desc = exif.ImageDescription || exif.XPTitle || exif.XPSubject ||
                   exif.Caption || exif.Headline || exif.ObjectName;
      if (desc && typeof desc === 'string' && desc.trim().length > 2) {
        result.description = desc.trim();
      }

      return Object.keys(result).length > 0 ? result : null;
    } catch (err) {
      console.warn('EXIF extraction failed:', err);
      return null;
    }
  }

  // Geocoding queue to respect 1 req/sec rate limit

  async function reverseGeocode(lat, lon) {
    return new Promise((resolve) => {
      geocodeQueue = geocodeQueue.then(async () => {
        try {
          const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=fr&zoom=14`;
          const resp = await fetch(url, {
            headers: { 'User-Agent': 'ImageToWebP-Converter/1.0' }
          });
          if (!resp.ok) { resolve(null); return; }
          const data = await resp.json();

          const addr = data.address || {};
          const result = {
            city: addr.city || addr.town || addr.village || addr.municipality || addr.hamlet || '',
            district: addr.suburb || addr.neighbourhood || addr.quarter || '',
            region: addr.state || addr.province || addr.region || '',
            country: addr.country || '',
            countryCode: addr.country_code || '',
            displayName: '',
            type: data.type || '',
            category: data.category || '',
          };

          // Build display name
          const parts = [result.city, result.region, result.country].filter(Boolean);
          result.displayName = parts.join(', ');

          resolve(result);
        } catch (err) {
          console.warn('Geocoding failed:', err);
          resolve(null);
        }
        // Rate limit: wait 1.1 sec between requests
        await new Promise(r => setTimeout(r, 1100));
      });
    });
  }

  function generateSmartSeo(predictions, exifData, geoData, manualCity, visionData) {
    const tags = [];
    let filename = '';
    let alt = '';
    let title = '';

    // Manual city overrides geoData
    if (manualCity) {
      geoData = {
        city: manualCity.name,
        region: manualCity.region,
        country: manualCity.country,
        displayName: `${manualCity.name}, ${manualCity.region}, ${manualCity.country}`
      };
    }

    const hasVision = visionData && (visionData.landmarks.length > 0 || visionData.labels.length > 0);
    const hasLandmark = visionData && visionData.landmarks.length > 0;
    const hasGeo = geoData && geoData.city;
    const hasScene = predictions && predictions.length > 0;

    // === GOOGLE VISION: Best quality source ===
    if (hasVision) {
      // Add landmark tags
      if (hasLandmark) {
        visionData.landmarks.forEach(l => {
          tags.push({ translated: l.name, confidence: l.confidence, type: 'landmark' });
        });
      }

      // Add label tags (top 5)
      visionData.labels.slice(0, 5).forEach(l => {
        tags.push({ translated: l.name, confidence: l.confidence, type: 'vision' });
      });

      // Add web entities
      visionData.webEntities.slice(0, 3).forEach(e => {
        tags.push({ translated: e.name, confidence: e.confidence, type: 'web' });
      });

      // Add best guess
      if (visionData.bestGuessLabels.length > 0) {
        tags.push({ translated: visionData.bestGuessLabels[0], confidence: 95, type: 'guess' });
      }

      // Build SEO from vision data
      if (hasLandmark) {
        // LANDMARK DETECTED (ex: "Kasbah des Oudayas")
        const landmark = visionData.landmarks[0].name;
        const sceneLabel = visionData.labels.length > 0 ? visionData.labels[0].name.toLowerCase() : '';
        const city = hasGeo ? geoData.city : '';
        const country = hasGeo ? geoData.country : '';

        if (city) {
          filename = cleanForFilename(`${landmark}-${city}-${country}`);
          alt = `${landmark} a ${city}, ${country}`;
          title = `Photo de ${landmark} - ${city}, ${country}`;
        } else {
          filename = cleanForFilename(landmark);
          alt = landmark;
          title = `Photo de ${landmark}`;
        }

        // Add geo tags if available
        if (hasGeo) {
          tags.push({ translated: geoData.city, confidence: 99, type: 'geo' });
          tags.push({ translated: geoData.country, confidence: 99, type: 'geo' });
        }

      } else {
        // NO LANDMARK but have labels
        const bestGuess = visionData.bestGuessLabels.length > 0 ? visionData.bestGuessLabels[0] : '';
        const topLabels = visionData.labels.slice(0, 3).map(l => l.name.toLowerCase());
        const mainLabel = bestGuess || topLabels[0] || '';

        if (hasGeo) {
          const city = geoData.city;
          const country = geoData.country;
          filename = cleanForFilename(`${mainLabel}-${city}-${country}`);
          alt = capitalize(`${mainLabel} a ${city}, ${country}`);
          title = `Photo de ${mainLabel} - ${city}, ${geoData.region || country}`;
          tags.push({ translated: city, confidence: 99, type: 'geo' });
          tags.push({ translated: country, confidence: 99, type: 'geo' });
        } else {
          const secondary = topLabels[1] || '';
          filename = cleanForFilename(`${mainLabel}${secondary ? '-' + secondary : ''}`);
          alt = capitalize(mainLabel + (secondary ? ` - ${secondary}` : ''));
          title = `Photo de ${mainLabel}`;
        }
      }

    } else {
      // === FALLBACK: MobileNet + GPS ===
      const hasOldScene = hasScene;
      let sceneLabels = [];

      if (hasOldScene) {
        sceneLabels = predictions.map(p => ({
          label: p.className,
          translated: translateLabel(p.className),
          confidence: Math.round(p.probability * 100)
        }));
        sceneLabels.forEach(t => tags.push({ ...t, type: 'ai' }));
      }

      if (hasGeo) {
        tags.unshift({ translated: geoData.city, confidence: 99, type: 'geo' });
        if (geoData.country) tags.push({ translated: geoData.country, confidence: 99, type: 'geo' });
      }

      const mainScene = sceneLabels.length > 0 ? sceneLabels[0].translated : '';

      if (hasGeo && hasOldScene) {
        filename = cleanForFilename(`${mainScene}-${geoData.city}-${geoData.country}`);
        alt = capitalize(`${mainScene} a ${geoData.city}, ${geoData.country}`);
        title = `Photo de ${mainScene} - ${geoData.city}, ${geoData.region || geoData.country}`;
      } else if (hasGeo) {
        filename = cleanForFilename(`photo-${geoData.city}-${geoData.country}`);
        alt = capitalize(`Vue de ${geoData.city}, ${geoData.region || geoData.country}`);
        title = `Photo de ${geoData.city} - ${geoData.region || geoData.country}`;
      } else if (hasOldScene) {
        const main = sceneLabels[0].translated;
        filename = cleanForFilename(main);
        alt = capitalize(main);
        title = `Photo de ${main}`;
      } else {
        filename = 'image';
        alt = 'Image';
        title = 'Image';
      }
    }

    // Add date to title if available
    if (exifData && exifData.year && !title.includes(String(exifData.year))) {
      title += ` (${exifData.year})`;
    }

    return { filename, alt, title, tags };
  }

  function capitalize(str) {
    if (!str) return str;
    return str.charAt(0).toUpperCase() + str.slice(1);
  }

  function cleanForFilename(str) {
    return str
      .toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // Remove accents
      .replace(/[^a-z0-9-]/g, '-')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '')
      .substring(0, 60);
  }

  async function findOptimalQuality(img, maxBytes = 1000000) {
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);

    let quality = 80;
    let blob = await new Promise(r => canvas.toBlob(r, 'image/webp', quality / 100));
    if (blob && blob.size <= maxBytes) return { quality, blob };

    let lo = 10, hi = 75;
    let bestQuality = 10;
    let bestBlob = null;

    while (lo <= hi) {
      const mid = Math.floor((lo + hi) / 2);
      blob = await new Promise(r => canvas.toBlob(r, 'image/webp', mid / 100));
      if (blob && blob.size <= maxBytes) {
        bestQuality = mid;
        bestBlob = blob;
        lo = mid + 1;
      } else {
        hi = mid - 1;
      }
    }

    if (!bestBlob) {
      let scale = 0.9;
      while (scale > 0.2) {
        const w = Math.round(img.naturalWidth * scale);
        const h = Math.round(img.naturalHeight * scale);
        canvas.width = w;
        canvas.height = h;
        ctx.drawImage(img, 0, 0, w, h);
        blob = await new Promise(r => canvas.toBlob(r, 'image/webp', 0.5));
        if (blob && blob.size <= maxBytes) {
          return { quality: 50, blob, resized: { width: w, height: h } };
        }
        scale -= 0.1;
      }
      return { quality: 10, blob };
    }

    return { quality: bestQuality, blob: bestBlob };
  }

  function convertToWebP(img, quality) {
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    return new Promise(resolve => {
      canvas.toBlob(blob => resolve(blob), 'image/webp', quality / 100);
    });
  }

          </div>

          <div class="field">
            <label>Attribut title <span class="tag">SEO</span> <span class="tag-ai">IA</span> <span class="tag-geo" id="${id}-geolabel3" style="display:none">GPS</span></label>
            <input type="text" id="${id}-title" value="" placeholder="Analyse en cours...">
            <div class="hint">Texte affiche au survol</div>
          </div>

          <div class="seo-preview">
            <h4>Apercu HTML</h4>
            <code id="${id}-htmlpreview"></code>
          </div>

          <div class="actions">
            <button class="btn btn-primary" id="${id}-download">Telecharger WebP</button>
            <button class="btn btn-copy" id="${id}-copyhtml">Copier le HTML</button>
            <button class="btn btn-secondary" id="${id}-remove">Supprimer</button>
          </div>
        `;

        cardsContainer.appendChild(card);

        const qualitySlider = document.getElementById(`${id}-quality`);
        const qualVal = document.getElementById(`${id}-qualval`);
        const filenameInput = document.getElementById(`${id}-filename`);
        const altInput = document.getElementById(`${id}-alt`);
        const titleInput = document.getElementById(`${id}-title`);
        const htmlPreview = document.getElementById(`${id}-htmlpreview`);
        const aiStatus = document.getElementById(`${id}-aistatus`);
        const tagsContainer = document.getElementById(`${id}-tags`);
        const exifContainer = document.getElementById(`${id}-exif`);

        function updateHtmlPreview() {
          const fn = filenameInput.value || 'image';
          const alt = altInput.value;
          const title = titleInput.value;
          htmlPreview.textContent = `<img src="${fn}.webp" alt="${alt}" title="${title}" width="${img.naturalWidth}" height="${img.naturalHeight}" loading="lazy">`;
        }

        // --- Auto-optimize to < 1MB ---
        const optResult = await findOptimalQuality(img);
        qualitySlider.value = optResult.quality;
        qualVal.textContent = optResult.quality + '%';
        if (optResult.blob) {
          document.getElementById(`${id}-webpsize`).textContent = `WebP : ${formatSize(optResult.blob.size)}`;
          const savings = ((1 - optResult.blob.size / file.size) * 100).toFixed(0);
          document.getElementById(`${id}-savings`).textContent = `${savings > 0 ? '-' : '+'}${Math.abs(savings)}%`;
        }
        if (optResult.resized) {
          document.getElementById(`${id}-autolabel`).textContent = `AUTO < 1 Mo (redim. ${optResult.resized.width}x${optResult.resized.height})`;
        }

        // --- Run EXIF + AI + Google Vision in parallel ---
        aiStatus.innerHTML = '<span class="ai-spinner"></span> Analyse IA + Google Vision + EXIF...';
        const [exifData, predictions, visionData] = await Promise.all([
          extractExifData(file),
          analyzeImage(document.getElementById(`${id}-imgel`)),
          analyzeWithGoogleVision(file)
        ]);

        // --- Geocoding if GPS available ---
        let geoData = null;
        if (exifData && exifData.lat && exifData.lon) {
          aiStatus.innerHTML = '<span class="ai-spinner"></span> Localisation GPS en cours...';
          geoData = await reverseGeocode(exifData.lat, exifData.lon);
        }

        // --- Display EXIF info ---
        if (exifData && (geoData || exifData.date || exifData.camera)) {
          let exifHtml = '';
          if (geoData && geoData.displayName) {
            exifHtml += `<div class="exif-item location"><span class="exif-icon">📍</span><span class="exif-label">Lieu :</span><span class="exif-value">${geoData.displayName}</span></div>`;
          }
          if (exifData.date) {
            exifHtml += `<div class="exif-item"><span class="exif-icon">📅</span><span class="exif-label">Date :</span><span class="exif-value">${exifData.date}</span></div>`;
          }
          if (exifData.camera) {
            exifHtml += `<div class="exif-item"><span class="exif-icon">📱</span><span class="exif-label">Appareil :</span><span class="exif-value">${exifData.camera}</span></div>`;
          }
          exifContainer.innerHTML = exifHtml;
          exifContainer.style.display = 'flex';
        }

        // --- Generate smart SEO ---
        const seo = generateSmartSeo(predictions, exifData, geoData, null, visionData);

        filenameInput.value = seo.filename;
        altInput.value = seo.alt;
        titleInput.value = seo.title;

        // Show GPS badge if location was used
        if (geoData && geoData.city) {
          document.getElementById(`${id}-geolabel`).style.display = 'inline';
          document.getElementById(`${id}-geolabel2`).style.display = 'inline';
          document.getElementById(`${id}-geolabel3`).style.display = 'inline';
        }

        // --- Location autocomplete ---
        const locationInput = document.getElementById(`${id}-location`);
        const suggestionsEl = document.getElementById(`${id}-suggestions`);
        let selectedCity = null;

        // Pre-fill if GPS detected
        if (geoData && geoData.city) {
          locationInput.value = `${geoData.city}, ${geoData.country}`;
          locationInput.style.borderColor = '#34d399';
        }

        locationInput.addEventListener('input', () => {
          const q = locationInput.value;
          const matches = searchCities(q);
          if (matches.length > 0 && q.length >= 2) {
            suggestionsEl.innerHTML = matches.map((c, i) =>
              `<div class="location-suggestion" data-index="${i}">
                <span>📍 ${c.name}</span>
                <span class="loc-region">${c.region}, ${c.country}</span>
              </div>`
            ).join('');
            suggestionsEl.classList.add('active');
            suggestionsEl._matches = matches;
          } else {
            suggestionsEl.classList.remove('active');
          }
        });

        suggestionsEl.addEventListener('click', (ev) => {
          const item = ev.target.closest('.location-suggestion');
          if (!item) return;
          const idx = parseInt(item.dataset.index);
          const city = suggestionsEl._matches[idx];
          selectedCity = city;
          locationInput.value = `${city.name}, ${city.country}`;
          locationInput.style.borderColor = '#34d399';
          suggestionsEl.classList.remove('active');

          // Regenerate SEO with city
          const newSeo = generateSmartSeo(predictions, exifData, geoData, city, visionData);
          filenameInput.value = newSeo.filename;
          altInput.value = newSeo.alt;
          titleInput.value = newSeo.title;
          updateHtmlPreview();

          // Update tags
          tagsContainer.innerHTML = newSeo.tags.map(t => {
            let cls = 'detected-tag';
            let icon = '';
            if (t.type === 'geo') { cls += ' geo-tag'; icon = '📍 '; }
            else if (t.type === 'landmark') { cls += ' landmark-tag'; icon = '🏛️ '; }
            else if (t.type === 'vision') { cls += ' vision-tag'; icon = '👁️ '; }
            else if (t.type === 'web') { cls += ' web-tag'; icon = '🌐 '; }
            else if (t.type === 'guess') { cls += ' guess-tag'; icon = '💡 '; }
            const conf = t.confidence ? `<span class="confidence">${t.confidence}%</span>` : '';
            return `<span class="${cls}">${icon}${t.translated}${conf}</span>`;
          }).join('');

          // Show GPS badges
          document.getElementById(`${id}-geolabel`).style.display = 'inline';
          document.getElementById(`${id}-geolabel2`).style.display = 'inline';
          document.getElementById(`${id}-geolabel3`).style.display = 'inline';

          showToast(`Lieu defini : ${city.name}, ${city.country}`);
        });

        // Close suggestions on click outside
        document.addEventListener('click', (ev) => {
          if (!ev.target.closest(`#${id}-locfield`)) {
            suggestionsEl.classList.remove('active');
          }
        });

        // Display tags
        if (seo.tags && seo.tags.length > 0) {
          const sourceLabel = visionData ? 'Google Vision' : 'MobileNet';
          aiStatus.innerHTML = `&#10003; Analyse terminee (${sourceLabel})`;
          aiStatus.classList.add('done');
          tagsContainer.innerHTML = seo.tags.map(t => {
            let cls = 'detected-tag';
            let icon = '';
            if (t.type === 'geo') { cls += ' geo-tag'; icon = '📍 '; }
            else if (t.type === 'landmark') { cls += ' landmark-tag'; icon = '🏛️ '; }
            else if (t.type === 'vision') { cls += ' vision-tag'; icon = '👁️ '; }
            else if (t.type === 'web') { cls += ' web-tag'; icon = '🌐 '; }
            else if (t.type === 'guess') { cls += ' guess-tag'; icon = '💡 '; }
            const conf = t.confidence ? `<span class="confidence">${t.confidence}%</span>` : '';
            return `<span class="${cls}">${icon}${t.translated}${conf}</span>`;
          }).join('');
        } else {
          aiStatus.innerHTML = 'Analyse non disponible';
          aiStatus.classList.add('done');
          const base = file.name.replace(/\.[^.]+$/, '').replace(/[_.\s]+/g, '-').toLowerCase();
          filenameInput.value = base;
          altInput.value = base.replace(/-/g, ' ');
          titleInput.value = base.replace(/-/g, ' ');
        }

        updateHtmlPreview();

        // Events
        async function updateWebPSize() {
          const blob = await convertToWebP(img, parseInt(qualitySlider.value));
          if (!blob) return;
          document.getElementById(`${id}-webpsize`).textContent = `WebP : ${formatSize(blob.size)}`;
          const savings = ((1 - blob.size / file.size) * 100).toFixed(0);
          document.getElementById(`${id}-savings`).textContent = `${savings > 0 ? '-' : '+'}${Math.abs(savings)}%`;
        }

        qualitySlider.addEventListener('input', () => {
          qualVal.textContent = qualitySlider.value + '%';
          document.getElementById(`${id}-autolabel`).textContent = 'MANUEL';
          updateWebPSize();
        });

        [filenameInput, altInput, titleInput].forEach(input => {
          input.addEventListener('input', updateHtmlPreview);
        });

        document.getElementById(`${id}-download`).addEventListener('click', async () => {
          const blob = await convertToWebP(img, parseInt(qualitySlider.value));
          if (!blob) return;
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = (filenameInput.value || 'image') + '.webp';
          a.click();
          URL.revokeObjectURL(url);
          showToast('Image WebP telechargee !');
        });

        document.getElementById(`${id}-copyhtml`).addEventListener('click', () => {
          navigator.clipboard.writeText(htmlPreview.textContent).then(() => {
            showToast('HTML copie !');
          });
        });

        document.getElementById(`${id}-remove`).addEventListener('click', () => {
          card.remove();
          const remaining = cardsContainer.children.length;
          if (!remaining) results.classList.remove('active');
          else batchTitle.textContent = `${remaining} image${remaining > 1 ? 's' : ''} chargee${remaining > 1 ? 's' : ''}`;
        });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }
</script>

</body>
</html>
